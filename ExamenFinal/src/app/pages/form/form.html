<div class="container mt-3 ">
    <div>
    <div class="row">
        <div class="col-12">
            <h2 class="mb-4">{{ isNew ? 'Crear Héroe' : 'Editar Héroe' }}</h2>

            <form [formGroup]="ninjaForm" (ngSubmit)="getDataForm()">

                <!-- Sección: Información Básica -->
                <div class="card mb-4">
                    <div class="card-header">
                        <h5 class="mb-0">Información Básica</h5>
                    </div>
                    <div class="card-body">
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="ninjaname" class="form-label">Nombre del Ninja</label>
                                <input id="ninjaname" type="text" class="form-control" formControlName="ninjaname"
                                    placeholder="Ej: Madara">
                            </div>

                            <div class="col-md-6 mb-3">
                                <label for="fullname" class="form-label">Nombre Completo</label>
                                <input id="fullname" type="text" class="form-control" formControlName="fullname"
                                    placeholder="Ej: Uchiha Madara">
                            </div>
                            
                            <div class="col-md-6 mb-3">
                                <label for="clan" class="form-label">Clan</label>
                                <input id="clan" type="text" class="form-control" formControlName="clan"
                                    placeholder="Ej: DAW">
                            </div>

                            <div class="col-md-6 mb-3">
                                <label for="image1" class="form-label">Image1</label>
                                <input id="image1" type="text" class="form-control" formControlName="image1"
                                    placeholder="URL">
                            </div>

                            <div class="col-md-6 mb-3">
                                <label for="image2" class="form-label">Imagen2</label>
                                <input id="image2" type="text" class="form-control" formControlName="image2"
                                    placeholder="URL">
                            </div>

                            <div class="col-md-6 mb-3">
                                <label for="naturetype" class="form-label">naturetype</label>
                                <input id="naturetype" type="text" class="form-control" formControlName="naturetype"
                                    placeholder="naturetype">
                            </div>

                            <div class="col-md-12 mb-3">
                                <label for="affiliation" class="form-label">affiliation</label>
                                <input id="affiliation" type="text" class="form-control" formControlName="affiliation"
                                    placeholder="affiliation">
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Sección: Características -->
                <div class="card mb-4">
                    <div class="card-header">
                        <h5 class="mb-0">Características</h5>
                    </div>
                    <div class="card-body">
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="gender" class="form-label">Género</label>
                                    <select class="form-select" id="gender" formControlName="gender" required>
                                        <option value="">Seleccione...</option>
                                        <option value="Male">Masculino</option>
                                        <option value="Female">Femenino</option>
                                        <option value="Other">Otro</option>
                                    </select>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label for="level" class="form-label">level</label>
                                <input id="level" type="text" class="form-control" formControlName="level"
                                    placeholder="level">
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Sección: Estadísticas de Poder -->
                <div class="card mb-4" formGroupName="stats">
                    <div class="card-header">
                        <h5 class="mb-0">Estadísticas de Poder</h5>
                    </div>
                    <div class="card-body">
                        <div class="row">

                            <div class="col-md-4 mb-3">
                                <label for="ninjutsu" class="form-label">ninjutsu</label>
                                <input id="ninjutsu" type="number" class="form-control"
                                    formControlName="ninjutsu" min="0" max="100">
                            </div>

                            <div class="col-md-4 mb-3">
                                <label for="taijutsu" class="form-label">taijutsu</label>
                                <input id="taijutsu" type="number" class="form-control" formControlName="taijutsu"
                                    min="0" max="100">
                            </div>

                            <div class="col-md-4 mb-3">
                                <label for="intelligence" class="form-label">Intelligence</label>
                                <input id="intelligence" type="number" class="form-control"
                                    formControlName="intelligence" min="0" max="100">
                            </div>


                            <div class="col-md-4 mb-3">
                                <label for="strength" class="form-label">Strength</label>
                                <input id="strength" type="number" class="form-control" formControlName="strength"
                                    min="0" max="100">
                            </div>

                            <div class="col-md-4 mb-3">
                                <label for="speed" class="form-label">Speed</label>
                                <input id="speed" type="number" class="form-control" formControlName="speed" min="0"
                                    max="100">
                            </div>



                            <div class="col-md-4 mb-3">
                                <label for="stamina" class="form-label">stamina</label>
                                <input id="stamina" type="number" class="form-control" formControlName="stamina" min="0"
                                    max="100">
                            </div>

                            <div class="col-md-4 mb-3">
                                <label for="handseals" class="form-label">handseals</label>
                                <input id="handseals" type="number" class="form-control" formControlName="handseals" min="0"
                                    max="100">
                            </div>
                        </div>
                    </div>
                

                <!-- Botones de acción -->
                <div class="d-flex justify-content-end gap-2">
                    <button type="button" routerLink="/home" class="btn btn-secondary">
                        Cancelar
                    </button>
                    <button type="button" class="btn btn-warning " (click)="onReset()">
                        Resetear
                    </button>
                    <button type="submit" [disabled]="ninjaForm.invalid" class="btn btn-primary" >
                        {{ isNew ? 'Crear Ninja' : 'Actualizar Ninja' }}
                    </button>
                </div>
</div>
            </form>
        </div>
    </div>
</div>
