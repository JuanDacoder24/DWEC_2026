<div class="container mt-4">
  <div class="card mb-4">
    <div class="card-body">
      <h5 class="card-title">Busca a tu Ninja</h5>
      <div class="row g-3">
        
        <!-- Búsqueda por nombre -->
        <div class="col-md-4">
          <label for="searchName" class="form-label">Buscar por nombre</label>
          <input 
            type="text" 
            class="form-control" 
            id="searchName"
            [(ngModel)]="searchName"
            (ngModelChange)="applyFilters() "
            placeholder="Nombre del ninja...">
        </div>



        <!-- Filtro por género -->
        <div class="col-md-3">
          <label for="gender" class="form-label">Género</label>
          <select 
            class="form-select" 
            id="gender"
            [(ngModel)]="selectedGender"
            (ngModelChange)="applyFilters()">
            <option value="">Todos</option>
            <option value="Male">Masculino</option>
            <option value="Female">Femenino</option>
          </select>
        </div>

        <!-- Filtro por poder mínimo -->
        <div class="col-md-2">
          <label for="minNinjutsu" class="form-label">Fuerza: {{ minNinjutsu }}</label>
          <input 
            type="range" 
            class="form-range" 
            id="minNinjutsu"
            [(ngModel)]="minNinjutsu"
            (ngModelChange)="applyFilters()"
            min="1" 
            max="100">
        </div>

      </div>
      
      <!-- Botón resetear -->
      <div class="row mt-3">
        <div class="col-12">
          <button class="btn btn-secondary btn-sm" (click)="resetFilters()">
            <i class="bi bi-x-circle"></i> Limpiar filtros
          </button>
          <span class="ms-3 text-muted">
            {{ ninjasFiltered.length }} héroe(s) encontrado(s)
          </span>
        </div>
      </div>


    </div>
  </div>


    <div class="row">
        @for (ninja of ninjasFiltered; track ninja.id) {
      <div class="col-md-4 col-lg-3 mb-4">
        <app-card [ninja]="ninja"></app-card>
      </div>
    } @empty {
      <div class="col-12">
        <div class="alert alert-info text-center">
          <i class="bi bi-info-circle"></i>
          No hay héroes disponibles
        </div>
      </div>
    }
    </div>
  
  


</div>
<div class="row mt-4">
    <div class="col-12">
      <nav aria-label="Paginación de héroes">
        <ul class="pagination justify-content-center">
          
          <!-- Botón Anterior -->
          <li class="page-item" [class.disabled]="isFirst">
            <button class="page-link" (click)="previousPage()" [disabled]="isFirst">
              <i class="bi bi-chevron-left"></i> Anterior
            </button>
          </li>
          
          <!-- Números de página -->
          @for (page of pages; track page) {
            <li class="page-item" [class.active]="currentPage === page">
              <button class="page-link" (click)="goToPage(page)">
                {{ page + 1 }}
              </button>
            </li>
          }
          
          <!-- Botón Siguiente -->
          <li class="page-item" [class.disabled]="isLast">
            <button class="page-link" (click)="nextPage()" [disabled]="isLast">
              Siguiente <i class="bi bi-chevron-right"></i>
            </button>
          </li>
          
        </ul>
      </nav>
      
      <!-- Info de paginación -->
      <p class="text-center text-muted">
        Página {{ currentPage + 1 }} de {{ totalPages }} 
        ({{ totalElements }} héroes en total)
      </p>
    </div>
  </div>
