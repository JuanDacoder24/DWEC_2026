<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Naruto</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body class="bg-light">
    <section id="inicio" class="hero-section">

      <div class="hero-overlay"></div>
      <div class="hero-content">
        <div class="container px-4 px-sm-5 px-lg-4">
          <div class="row">
            <div class="col-lg-8 col-xl-7">
              <div class="mb-4">
                <span class="badge-custom"> Los ninjas mas fuertes de la historia </span>
              </div>

              <h1 class="hero-title text-light">
                Descubre a todos los ninjas de 
                <span class="d-block mt-2 text-indigo">Naruto</span>
              </h1>

              @if(isToken){
            <button type="submit" class="btn btn-lg w-100 mb-3 fw-semibold position-relative overflow-hidden" style="background: linear-gradient(100deg, #0d2a4a 20%, #27ae60 100%); 
                           border: none; color: white; padding: 0.875rem; 
                           box-shadow: 0 8px 32px rgba(39,174,96,0.35);
                           transition: all 0.3s ease;"
            onmouseover="this.style.transform='translateY(-2px)'; this.style.boxShadow='0 6px 24px rgba(39,174,96,0.6)'"
            onmouseout="this.style.transform='translateY(0)'; this.style.boxShadow='0 4px 16px rgba(39,174,96,0.4)'" [routerLink]="['/dashboard/list']">
            <span class="d-flex align-items-center justify-content-center gap-2">

                Página principal
                <svg class="ms-2" width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
                </svg>
            </span>
        </button>

        }@else {
            <button type="submit" class="btn btn-lg w-100 mb-3 fw-semibold position-relative overflow-hidden" style="background: linear-gradient(100deg, #0d2a4a 20%, #27ae60 100%); 
                           border: none; color: white; padding: 0.875rem; 
                           box-shadow: 0 8px 32px rgba(39,174,96,0.35);
                           transition: all 0.3s ease;"
            onmouseover="this.style.transform='translateY(-2px)'; this.style.boxShadow='0 6px 24px rgba(39,174,96,0.6)'"
            onmouseout="this.style.transform='translateY(0)'; this.style.boxShadow='0 4px 16px rgba(39,174,96,0.4)'" [routerLink]="['/login']">
            <span class="d-flex align-items-center justify-content-center gap-2">

                Login
                <svg class="ms-2" width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
                </svg>
            </span>
        </button>
        }
            </div>
          </div>
        </div>
      </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
