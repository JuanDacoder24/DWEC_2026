<div class="card h-100">
  <img 
    [src]="ninja.image1 || 'https://via.placeholder.com/300x400'" 
    class="card-img-top" 
    [alt]="ninja.ninjaName"
    style="height: 300px; object-fit: cover;">
  
  <div class="card-body d-flex flex-column">
    <h5 class="card-title">{{ ninja.ninjaName }}</h5>
    <p class="card-text text-muted">{{ ninja.fullname }}</p>
    
    <div class="mt-auto">
      <div class="mb-2">
        <span class="badge bg-secondary me-1">{{ ninja.clan }}</span>
        <span class="badge" 
          [class.bg-success]="ninja.naturetype === 'Wind'"
          [class.bg-danger]="ninja.naturetype === 'Fire'"
          [class.bg-warning]="ninja.naturetype === 'Yang'">
          {{ ninja.naturetype }}
        </span>
      </div>
      
      <div class="d-flex gap-2">
        <a [routerLink]="['/heroe', ninja.id]" class="btn btn-sm btn-info flex-fill">
          Ver Detalles
        </a>
        <a [routerLink]="['/formulario', ninja.id]" class="btn btn-sm btn-warning flex-fill">
          Editar
        </a>
      </div>
    </div>
  </div>
</div>
